<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 227">
  <style>
    .nd {
      fill: #2196f3;
      opacity: 0;
      animation: nd-in 0.45s ease forwards;
    }
    @keyframes nd-in {
      from { opacity: 0; r: 0; }
      to { opacity: 1; }
    }

    .ed {
      stroke: #1e88e5;
      stroke-width: 1;
      opacity: 0;
      animation: ed-in 0.35s ease forwards;
    }
    @keyframes ed-in {
      from { opacity: 0; }
      to { opacity: 0.75; }
    }

    .final-img {
      opacity: 0;
      animation: final-in 0.6s ease 1.6s forwards;
    }
    @keyframes final-in {
      to { opacity: 1; }
    }

    /* Delay groups */
    .t0  { animation-delay: 0s; }
    .t1  { animation-delay: 0.08s; }
    .t2  { animation-delay: 0.16s; }
    .t3  { animation-delay: 0.24s; }
    .t4  { animation-delay: 0.32s; }
    .t5  { animation-delay: 0.40s; }
    .t6  { animation-delay: 0.48s; }
    .t7  { animation-delay: 0.56s; }
    .t8  { animation-delay: 0.64s; }
    .t9  { animation-delay: 0.72s; }
    .t10 { animation-delay: 0.80s; }
    .t11 { animation-delay: 0.88s; }
    .t12 { animation-delay: 0.96s; }
  </style>

