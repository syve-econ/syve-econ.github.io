# site properties and page defaults
title: SYVE
subtitle: The Society of Young Vietnamese Economists
description: A community of young Vietnamese economists fostering academic exchange, collaborative research, and intellectual growth in economics.
logo-text: false
header: images/background.jpg
footer: images/background.jpg
proofer: false
url: https://syve-econ.github.io
baseurl: ""

# site social media and other links
links:
  email: syve.info@gmail.com
  github: syve-econ
  twitter: syve_econ

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
