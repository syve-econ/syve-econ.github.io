<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 400">
  <style>
    /* Node animation: scale up + fade in */
    .nd {
      fill: #2196f3;
      opacity: 0;
      transform-origin: center;
      animation: nd-in 0.5s ease forwards;
    }
    @keyframes nd-in {
      from { opacity: 0; r: 0; }
      to { opacity: 1; }
    }

    /* Edge animation: fade in */
    .ed {
      stroke: #2196f3;
      stroke-width: 1.2;
      opacity: 0;
      animation: ed-in 0.4s ease forwards;
    }
    @keyframes ed-in {
      from { opacity: 0; }
      to { opacity: 0.7; }
    }

    /* Text animation */
    .anim-title {
      fill: currentColor;
      font-family: "Barlow", "Montserrat", sans-serif;
      opacity: 0;
      animation: txt-in 0.6s ease forwards;
    }
    @keyframes txt-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .anim-subtitle {
      fill: currentColor;
      font-family: "Barlow", "Montserrat", sans-serif;
      opacity: 0;
      animation: txt-in 0.6s ease forwards;
    }

    /* Delay classes: d0=0s, d1=0.1s, ... d12=1.2s */
    .d0 { animation-delay: 0s; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.3s; }
    .d4 { animation-delay: 0.4s; }
    .d5 { animation-delay: 0.5s; }
    .d6 { animation-delay: 0.6s; }
    .d7 { animation-delay: 0.7s; }
    .d8 { animation-delay: 0.8s; }
    .d9 { animation-delay: 0.9s; }
    .d10 { animation-delay: 1.0s; }
    .d11 { animation-delay: 1.1s; }
    .d12 { animation-delay: 1.2s; }
    .d13 { animation-delay: 1.3s; }
    .d14 { animation-delay: 1.4s; }
    .dt1 { animation-delay: 1.8s; }
    .dt2 { animation-delay: 2.1s; }
  </style>

